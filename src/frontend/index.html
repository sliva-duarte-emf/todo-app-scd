<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
  <main class="app-container">
    <h1>Todo List</h1>

    <form id="todo-form">
      <label for="todo-input">Nouvelle tâche</label>
      <input
        type="text"
        id="todo-input"
        name="todo"
        required
        aria-describedby="todo-help"
      >
      <p id="todo-help">Saisis une tâche puis appuie sur Ajouter</p>

      <button type="submit" aria-label="Ajouter une tâche">
        Ajouter
      </button>
    </form>

    <section aria-labelledby="todo-title">
      <h2 id="todo-title">Liste des tâches</h2>
      <ul id="todo-list" aria-live="polite">
        <li class="sr-only">Aucune tâche pour le moment</li>
      </ul>
    </section>
  </main>
</body>
</html>
